{% extends 'base.html' %}

{% block title %}Modifier Facture{% endblock %}

{% block content %}
<div class="card">
    <h1>Modifier Facture FAC-{{ facture.pk|stringformat:"04d" }}</h1>
    
    <form method="post">
        {% csrf_token %}
        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
            <div class="form-group">
                <label for="client_id">Client *</label>
                <select id="client_id" name="client_id" required>
                    {% for client in clients %}
                    <option value="{{ client.pk }}" {% if client.pk == facture.client_id %}selected{% endif %}>
                        {{ client.nom }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="date">Date *</label>
                <input type="date" id="date" name="date" value="{{ facture.date }}" required>
            </div>
            
            <div class="form-group">
                <label for="statut">Statut *</label>
                <select id="statut" name="statut" required>
                    <option value="brouillon" {% if facture.statut == 'brouillon' %}selected{% endif %}>Brouillon</option>
                    <option value="envoyee" {% if facture.statut == 'envoyee' %}selected{% endif %}>Envoyée</option>
                    <option value="payee" {% if facture.statut == 'payee' %}selected{% endif %}>Payée</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="taux_tva">Taux TVA (%)</label>
                <input type="number" id="taux_tva" name="taux_tva" value="{{ facture.taux_tva }}" step="0.01">
            </div>
        </div>
        
        <h2>Lignes de Facture</h2>
        <div id="lignes-container">
            {% for ligne in lignes %}
            <div class="ligne-row" style="display: grid; grid-template-columns: 2fr 1fr 1fr 0.5fr; gap: 0.5rem; margin-bottom: 0.5rem;">
                <input type="text" name="designation[]" value="{{ ligne.designation }}" placeholder="Désignation" required>
                <input type="number" name="quantite[]" value="{{ ligne.quantite }}" placeholder="Quantité" step="0.01" required>
                <input type="number" name="prix_unit[]" value="{{ ligne.prix_unit }}" placeholder="Prix Unitaire" step="0.01" required>
                <button type="button" class="btn btn-danger" onclick="this.parentElement.remove()">×</button>
            </div>
            {% endfor %}
            <div class="ligne-row" style="display: grid; grid-template-columns: 2fr 1fr 1fr 0.5fr; gap: 0.5rem; margin-bottom: 0.5rem;">
                <input type="text" name="designation[]" placeholder="Désignation" required>
                <input type="number" name="quantite[]" placeholder="Quantité" step="0.01" required>
                <input type="number" name="prix_unit[]" placeholder="Prix Unitaire" step="0.01" required>
                <button type="button" class="btn btn-danger" onclick="this.parentElement.remove()">×</button>
            </div>
        </div>
        <button type="button" class="btn btn-primary" onclick="addLigne()">+ Ajouter une ligne</button>
        
        <div style="margin-top: 2rem;">
            <button type="submit" class="btn btn-success">Enregistrer</button>
            <a href="{% url 'facture_detail' facture.pk %}" class="btn btn-danger">Annuler</a>
        </div>
    </form>
</div>

<script>
function addLigne() {
    const container = document.getElementById('lignes-container');
    const div = document.createElement('div');
    div.className = 'ligne-row';
    div.style = 'display: grid; grid-template-columns: 2fr 1fr 1fr 0.5fr; gap: 0.5rem; margin-bottom: 0.5rem;';
    div.innerHTML = `
        <input type="text" name="designation[]" placeholder="Désignation" required>
        <input type="number" name="quantite[]" placeholder="Quantité" step="0.01" required>
        <input type="number" name="prix_unit[]" placeholder="Prix Unitaire" step="0.01" required>
        <button type="button" class="btn btn-danger" onclick="this.parentElement.remove()">×</button>
    `;
    container.appendChild(div);
}
</script>
{% endblock %}
